workflow:
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_PIPELINE_SOURCE == "push"
    - if: $CI_COMMIT_TAG
    - if: $CI_COMMIT_BRANCH

.build-base:
  image:
    name: registry.ulbricht.casa/docker-images/android-native-app:latest
    pull_policy: always
  before_script:
    - chmod +x ./gradlew
    - mkdir -p /opt/secure
  cache:
    key: $CI_PROJECT_NAME
    paths:
      - .gradle
  tags:
    - runner-amd64

.deploy-base:
  extends:
    - .build-base
  script:
    - bundle update
    - bundle exec fastlane android ${TRACK}

stages:
  - lint
  - build
  - deploy-android
  - deploy-wear

lint-debug-app:
  stage: lint
  extends:
    - .build-base
  script:
    - ./gradlew -Pci --console=plain lintDebug -PbuildDir=build

lint-release-app:
  stage: lint
  extends:
    - .build-base
  script:
    - ./gradlew -Pci --console=plain lintRelease -PbuildDir=build

build-debug-app:
  stage: build
  extends:
    - .build-base
  script:
    - ./gradlew -Pci --console=plain bundleDebug -PbuildDir=build

read-secure-files:
  image: registry.gitlab.com/gitlab-org/cli:latest
  stage: lint
  script:
    - glab auth login --job-token $CI_JOB_TOKEN --hostname $CI_SERVER_FQDN --api-protocol $CI_SERVER_PROTOCOL
    - glab -R $CI_PROJECT_PATH securefile download --all --output-dir=".secure_files"
  artifacts:
    paths:
      - $CI_PROJECT_DIR/.secure_files

build-release-app:
  stage: build
  extends:
    - .build-base
  needs:
    - read-secure-files
  script:
    - ./gradlew -Pci --console=plain bundle -PbuildDir=build
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_TAG
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      when: never

deploy-android-app:
  extends:
    - .deploy-base
  needs:
    - read-secure-files
  variables:
    TRACK: android
  stage: deploy-android
  rules:
    - if: $CI_COMMIT_TAG

deploy-wear-app:
  extends:
    - .deploy-base
  needs:
    - read-secure-files
    - deploy-android-app
  variables:
    TRACK: wear
  stage: deploy-wear
  dependencies:
    - deploy-android-app
  rules:
    - if: $CI_COMMIT_TAG